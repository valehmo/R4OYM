<script>
    const APP_ID = "c92b101b-660e-4e39-bf95-d989a4223dd1";
    const API_KEY = "V2-z4Bsp-wVHvQ-LQ2wi-z6Ahd-j9Oue-Ks0Db-8vnTt-e4TJt";
    
    let datosTech = { '2g': [], '3g': [], '4g': [], '5g': [] };
    let coincidenciasCalculadas = [];
    let filtrosActivos = { '2g': null, '3g': null, '4g': null, '5g': null, 'coincidencias': null };
    let filtrosWarRoom = { jefe: null, tecnologia: null };
    let charts = {};
    
    const coloresTech = { '2G': '#6c757d', '3G': '#ff9800', '4G': '#2196f3', '5G': '#4caf50' };
    
    const rangosDias = [
        { label: '0-30 días', min: 0, max: 30, color: '#ffc107' },
        { label: '31-90 días', min: 31, max: 90, color: '#17a2b8' },
        { label: '91-180 días', min: 91, max: 180, color: '#28a745' },
        { label: '181-365 días', min: 181, max: 365, color: '#fd7e14' },
        { label: '365+ días', min: 366, max: 9999, color: '#dc3545' }
    ];
    
    function extraerDias(v) {
        if (!v && v !== 0) return 0;
        if (typeof v === 'number') return v;
        if (typeof v === 'string') {
            v = v.trim();
            if (v.includes(':')) return parseInt(v.split(':')[0]) || 0;
            let n = parseInt(v);
            return isNaN(n) ? 0 : n;
        }
        return 0;
    }
    
    function parsearFecha(fechaStr) {
        if (!fechaStr || fechaStr === '') return null;
        let fecha = new Date(fechaStr);
        if (!isNaN(fecha.getTime())) return fecha;
        let partes = fechaStr.split('/');
        if (partes.length === 3) {
            fecha = new Date(partes[2], partes[1]-1, partes[0]);
            if (!isNaN(fecha.getTime())) return fecha;
        }
        partes = fechaStr.split('-');
        if (partes.length === 3 && partes[0].length === 2) {
            fecha = new Date(partes[2], partes[1]-1, partes[0]);
            if (!isNaN(fecha.getTime())) return fecha;
        }
        return null;
    }
    
    function calcularFechaActualizacionReporte() {
        let fechasReporte = [];
        function procesarTecnologia(techData) {
            for (let registro of techData) {
                if (registro.dias === 1 && registro.inicio && registro.inicio !== '') {
                    let fechaInicio = parsearFecha(registro.inicio);
                    if (fechaInicio && !isNaN(fechaInicio.getTime())) {
                        let fechaReporte = new Date(fechaInicio);
                        fechaReporte.setDate(fechaInicio.getDate() + 1);
                        fechasReporte.push(fechaReporte);
                    }
                }
            }
        }
        procesarTecnologia(datosTech['2g']);
        procesarTecnologia(datosTech['3g']);
        procesarTecnologia(datosTech['4g']);
        procesarTecnologia(datosTech['5g']);
        
        if (fechasReporte.length === 0) return null;
        return new Date(Math.max(...fechasReporte.map(f => f.getTime())));
    }
    
    function actualizarFechaReporteUI() {
        const fechaReporte = calcularFechaActualizacionReporte();
        const reportDateSpan = document.getElementById('reportDateValue');
        const statusSpan = document.getElementById('reportDateStatusText');
        const statusContainer = document.getElementById('reportDateStatus');
        if (!reportDateSpan) return;
        if (fechaReporte) {
            const dia = fechaReporte.getDate().toString().padStart(2, '0');
            const mes = (fechaReporte.getMonth() + 1).toString().padStart(2, '0');
            const anio = fechaReporte.getFullYear();
            reportDateSpan.innerHTML = `${dia}/${mes}/${anio}`;
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);
            const diffDias = Math.floor((hoy - fechaReporte) / (1000 * 60 * 60 * 24));
            if (diffDias <= 2) {
                statusSpan.innerHTML = '✅ DATOS FRESCOS';
                statusContainer.style.background = 'rgba(76, 175, 80, 0.2)';
                statusContainer.style.borderLeft = '3px solid #4caf50';
            } else if (diffDias <= 7) {
                statusSpan.innerHTML = '⚠️ DATOS CON RETARDO (' + diffDias + ' días)';
                statusContainer.style.background = 'rgba(255, 152, 0, 0.2)';
                statusContainer.style.borderLeft = '3px solid #ff9800';
            } else {
                statusSpan.innerHTML = '🔴 DATOS DESACTUALIZADOS (' + diffDias + ' días)';
                statusContainer.style.background = 'rgba(244, 67, 54, 0.2)';
                statusContainer.style.borderLeft = '3px solid #f44336';
            }
        } else {
            reportDateSpan.innerHTML = 'No disponible';
            statusSpan.innerHTML = '❓ Sin datos con 1 día de afectación';
            statusContainer.style.background = 'rgba(158, 158, 158, 0.2)';
        }
    }
    
    function obtenerRango(dias) {
        for (let r of rangosDias) if (dias >= r.min && dias <= r.max) return r.label;
        return '365+ días';
    }
    
    function calcularPrioridad(dias) {
        if (dias >= 60) return 'Crítica';
        if (dias >= 30) return 'Alta';
        if (dias >= 15) return 'Media';
        return 'Baja';
    }
    
    function actualizarBadgeYTitle() {
        let total = 0;
        for (let tech of ['2g', '3g', '4g', '5g']) {
            total += datosTech[tech].filter(s => s.dias >= 60).length;
        }
        const badge = document.getElementById('totalCriticosBadge');
        if (badge) {
            badge.innerHTML = `⚠️ ${total} sitios ≥60 días`;
            badge.style.background = total > 0 ? '#dc3545' : '#28a745';
        }
        const titleElement = document.getElementById('pageTitle');
        if (titleElement) {
            titleElement.innerText = total > 0 ? `⚠️ ${total} | OYMR4 Bloqueos` : `✅ OYMR4 Bloqueos - Sin críticos`;
        }
    }
    
    async function conectar() {
        let statusDiv = document.getElementById('connectionStatus');
        let statusText = document.getElementById('statusText');
        statusText.innerText = 'Conectando...';
        statusDiv.className = 'status-box status-loading';
        document.getElementById('dashboardContent').style.display = 'none';
        
        try {
            let [d2, d3, d4, d5] = await Promise.all([
                fetch(`https://api.appsheet.com/api/v2/apps/${APP_ID}/tables/Afectados%202G/Action`, {
                    method: 'POST',
                    headers: { 'ApplicationAccessKey': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "Action": "Find", "Properties": { "Locale": "es-MX" }, "Rows": [] })
                }).then(r => r.json()),
                fetch(`https://api.appsheet.com/api/v2/apps/${APP_ID}/tables/Afectados%203G/Action`, {
                    method: 'POST',
                    headers: { 'ApplicationAccessKey': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "Action": "Find", "Properties": { "Locale": "es-MX" }, "Rows": [] })
                }).then(r => r.json()),
                fetch(`https://api.appsheet.com/api/v2/apps/${APP_ID}/tables/Afectados%204G/Action`, {
                    method: 'POST',
                    headers: { 'ApplicationAccessKey': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "Action": "Find", "Properties": { "Locale": "es-MX" }, "Rows": [] })
                }).then(r => r.json()),
                fetch(`https://api.appsheet.com/api/v2/apps/${APP_ID}/tables/Afectados%205G/Action`, {
                    method: 'POST',
                    headers: { 'ApplicationAccessKey': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "Action": "Find", "Properties": { "Locale": "es-MX" }, "Rows": [] })
                }).then(r => r.json())
            ]);
            
            const mapRow = (row) => ({
                sitio: row['eNodeB'] || row['NodeB'] || 'Desconocido',
                jefe: row['Jefe de Zona'] || 'No especificado',
                dias: extraerDias(row['Días con Afectación'] || row['Días'] || 0),
                inicio: row['Inicio de afectación'] || '',
                sectores: row['Sectores Afectados'] || '',
                vector: row['Vector'] || ''
            });
            
            datosTech['2g'] = (Array.isArray(d2) ? d2 : (d2.Rows || [])).map(mapRow).filter(r => r.dias > 0).sort((a,b) => b.dias - a.dias);
            datosTech['3g'] = (Array.isArray(d3) ? d3 : (d3.Rows || [])).map(mapRow).filter(r => r.dias > 0).sort((a,b) => b.dias - a.dias);
            datosTech['4g'] = (Array.isArray(d4) ? d4 : (d4.Rows || [])).map(mapRow).filter(r => r.dias > 0).sort((a,b) => b.dias - a.dias);
            datosTech['5g'] = (Array.isArray(d5) ? d5 : (d5.Rows || [])).map(mapRow).filter(r => r.dias > 0).sort((a,b) => b.dias - a.dias);
            
            calcularCoincidencias();
            actualizarBadgeYTitle();
            actualizarFechaReporteUI();
            
            statusText.innerHTML = `✅ Conectado - 2G:${datosTech['2g'].length} | 3G:${datosTech['3g'].length} | 4G:${datosTech['4g'].length} | 5G:${datosTech['5g'].length}`;
            statusDiv.className = 'status-box status-connected';
            document.getElementById('dashboardContent').style.display = 'block';
            document.getElementById('lastUpdate').innerText = new Date().toLocaleString();
            
            renderizarTodo();
        } catch(e) {
            statusText.innerText = '❌ Error de conexión';
            statusDiv.className = 'status-box status-disconnected';
            console.error(e);
            document.getElementById('pageTitle').innerText = '❌ Error | OYMR4 Bloqueos';
        }
    }
    
    function calcularCoincidencias() {
        const mapa = new Map();
        for (let tech of ['2g', '3g', '4g', '5g']) {
            let nombreTech = tech.toUpperCase();
            for (let s of datosTech[tech]) {
                let key = s.sitio.toUpperCase().trim();
                if (!mapa.has(key)) mapa.set(key, { sitio: s.sitio, tecnologias: [], detalles: {}, maxDias: 0 });
                let entry = mapa.get(key);
                if (!entry.tecnologias.includes(nombreTech)) {
                    entry.tecnologias.push(nombreTech);
                    entry.detalles[nombreTech] = { dias: s.dias, jefe: s.jefe };
                    entry.maxDias = Math.max(entry.maxDias, s.dias);
                }
            }
        }
        coincidenciasCalculadas = Array.from(mapa.values())
            .filter(c => c.tecnologias.length > 1)
            .sort((a, b) => {
                if (a.tecnologias.length !== b.tecnologias.length) return b.tecnologias.length - a.tecnologias.length;
                return b.maxDias - a.maxDias;
            });
        for (let c of coincidenciasCalculadas) {
            let maxDias = 0, jefePpal = '';
            for (let t of c.tecnologias) if (c.detalles[t].dias > maxDias) { maxDias = c.detalles[t].dias; jefePpal = c.detalles[t].jefe; }
            c.jefePrincipal = jefePpal;
        }
    }
    
    function obtenerDatosWarRoom() {
        let todos = [];
        for (let tech of ['2g', '3g', '4g', '5g']) {
            for (let sitio of datosTech[tech]) {
                todos.push({ ...sitio, tecnologia: tech.toUpperCase(), prioridad: calcularPrioridad(sitio.dias) });
            }
        }
        return todos;
    }
    
    function limpiarFiltrosWarRoom() { filtrosWarRoom = { jefe: null, tecnologia: null }; renderizarWarRoom(); }
    function aplicarFiltroWarRoom(tipo, valor) {
        if (filtrosWarRoom[tipo] === valor) filtrosWarRoom[tipo] = null;
        else filtrosWarRoom[tipo] = valor;
        renderizarWarRoom();
    }

    function aplicarFiltro(tech, valor) {
        if (filtrosActivos[tech] === valor) filtrosActivos[tech] = null;
        else filtrosActivos[tech] = valor;
        if (tech === 'coincidencias') renderizarCoincidencias();
        else {
            let nombre = tech==='2g'?'2G':(tech==='3g'?'3G':(tech==='4g'?'4G':'5G'));
            let color = tech==='2g'?'#6c757d':(tech==='3g'?'#ff9800':(tech==='4g'?'#2196f3':'#4caf50'));
            let emoji = tech==='2g'?'📻':(tech==='3g'?'📱':(tech==='4g'?'📶':'✨'));
            renderizarSeccion(tech, nombre, color, emoji);
        }
    }
    
    window.limpiarFiltro = function(tech) {
        filtrosActivos[tech] = null;
        if(tech==='coincidencias') renderizarCoincidencias();
        else {
            let nombre = tech==='2g'?'2G':(tech==='3g'?'3G':(tech==='4g'?'4G':'5G'));
            let color = tech==='2g'?'#6c757d':(tech==='3g'?'#ff9800':(tech==='4g'?'#2196f3':'#4caf50'));
            let emoji = tech==='2g'?'📻':(tech==='3g'?'📱':(tech==='4g'?'📶':'✨'));
            renderizarSeccion(tech, nombre, color, emoji);
        }
    };
    
    window.exportarCSV = function(tech, nombre) {
        let rows = datosTech[tech];
        if(filtrosActivos[tech]) rows = rows.filter(r => r.jefe === filtrosActivos[tech]);
        if(!rows.length) return;
        let csv = "Nro,eNodeB,Jefe de Zona,Días,Inicio,Sectores,Vector\n";
        rows.forEach((r,i)=>csv+=`${i+1},"${r.sitio}","${r.jefe}",${r.dias},"${r.inicio}","${r.sectores}","${r.vector}"\n`);
        let blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8'});
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${nombre}_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    };
    
    window.exportarCoincidencias = function() {
        let filtradas = coincidenciasCalculadas;
        if(filtrosActivos['coincidencias']) filtradas = filtradas.filter(c=>c.jefePrincipal===filtrosActivos['coincidencias']);
        if(!filtradas.length) return;
        let csv = "Nro,Sitio,Jefe de Zona,Tecnologías,Total,Detalle\n";
        filtradas.forEach((c,i)=>{
            let detalle = c.tecnologias.map(t=>`${t}:${c.detalles[t].dias}días`).join(' | ');
            csv+=`${i+1},"${c.sitio}","${c.jefePrincipal||''}","${c.tecnologias.join(',')}",${c.tecnologias.length},"${detalle}"\n`;
        });
        let blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8'});
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Coincidencias_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    };
    
    window.exportarWarRoom = function() {
        let datos = obtenerDatosWarRoom();
        let criticos = datos.filter(s=>s.dias>=60);
        if(filtrosWarRoom.jefe) criticos = criticos.filter(s=>s.jefe===filtrosWarRoom.jefe);
        if(filtrosWarRoom.tecnologia) criticos = criticos.filter(s=>s.tecnologia===filtrosWarRoom.tecnologia);
        if(!criticos.length) return;
        let csv = "Nro,eNodeB,Jefe de Zona,Tecnología,Días,Prioridad,Inicio,Vector\n";
        criticos.forEach((r,i)=>{ csv+=`${i+1},"${r.sitio}","${r.jefe}","${r.tecnologia}",${r.dias},"${calcularPrioridad(r.dias)}","${r.inicio}","${r.vector}"\n`; });
        let blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8'});
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `WarRoom_60_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    };
    
    window.aplicarFiltroWarRoom = aplicarFiltroWarRoom;
    window.limpiarFiltrosWarRoom = limpiarFiltrosWarRoom;
    
    function cambiarPestania(tech) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.dataset.tech === tech) btn.classList.add('active');
        });
        const secciones = ['2g','3g','4g','5g','coincidencias','warroom'];
        secciones.forEach(sec => {
            let el = document.getElementById(`section-${sec}`);
            if(el) el.style.display = sec === tech ? 'block' : 'none';
        });
    }
    
    document.getElementById('refreshBtn').onclick = () => conectar();
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => cambiarPestania(btn.dataset.tech)));
    
    conectar();
</script>
</body>
</html>
